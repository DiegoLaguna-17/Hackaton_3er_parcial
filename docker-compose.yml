version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - servicio_usuarios
      - servicio_rutas
      - servicio_tracking
      - servicio_pagos
      - servicio_notificaciones
      - servicio_analitica

  servicio_usuarios:
    build: ./servicio_usuarios
    ports:
      - "3001:3001"
    env_file:
      - ./servicio_usuarios/.env
    depends_on:
      - kafka

  servicio_rutas:
    build: ./servicio_rutas
    ports:
      - "3002:3002"
    env_file:
      - ./servicio_rutas/.env
    depends_on:
      - kafka

  servicio_tracking:
    build: ./servicio_tracking
    ports:
      - "3003:3003"
    env_file:
      - ./servicio_tracking/.env
    depends_on:
      - kafka

  servicio_pagos:
    build: ./servicio_pagos
    ports:
      - "3004:3004"
    env_file:
      - ./servicio_pagos/.env
    depends_on:
      - kafka

  servicio_notificaciones:
    build: ./servicio_notificaciones
    ports:
      - "3005:3005"
    env_file:
      - ./servicio_notificaciones/.env
    depends_on:
      - kafka

  servicio_analitica:
    build: ./servicio_analitica
    ports:
      - "3006:3006"
    env_file:
      - ./servicio_analitica/.env
    depends_on:
      - kafka
